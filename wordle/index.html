<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agorlab_ // WORD</title>
    <style>
        :root {
            --bg: #050200;
            --text-main: #d96b30;
            --agorlab-orange: #ff5500;
            --portal-blue: #00bfff;
            --neutral: #1a0b00;
            /* Bordes sólidos y amigables en lugar de dashed */
            --border-style: 2px solid var(--text-main);
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            font-family: var(--font-mono);
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-sizing: border-box;
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.6) 2px,
                rgba(0, 0, 0, 0.6) 4px
            );
            /* Evita el scroll horizontal accidental en móviles */
            overflow-x: hidden; 
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(5, 2, 0, 0.95);
            padding: 20px 15px;
            z-index: 2;
            width: 100%;
            max-width: 500px; /* Más ancho para aprovechar pantallas modernas */
            min-height: 100vh;
            box-sizing: border-box;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: 25px;
            gap: 5px;
        }

        h1 {
            margin: 0;
            font-size: 2rem; /* Título más grande */
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--agorlab-orange);
            text-shadow: 0 0 12px rgba(255, 85, 0, 0.6);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--portal-blue);
            letter-spacing: 1.5px;
        }

        #wordle-grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 8px; /* Más espacio entre filas */
            margin-bottom: 25px;
            width: 100%;
            max-width: 380px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .tile {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 2px solid #4a2211; /* Borde sutil por defecto */
            border-radius: 12px; /* Esquinas redondeadas amigables */
            background-color: var(--neutral);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem; /* Letras enormes y legibles */
            font-weight: bold;
            color: var(--text-main);
            user-select: none;
            box-sizing: border-box;
            transition: all 0.3s ease; /* Transición suave de colores */
        }

        .tile.correct {
            background-color: var(--portal-blue);
            color: #000;
            border-color: var(--portal-blue);
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.4);
        }

        .tile.present {
            background-color: var(--agorlab-orange);
            color: #000;
            border-color: var(--agorlab-orange);
            box-shadow: 0 0 15px rgba(255, 85, 0, 0.4);
        }

        .tile.absent {
            background-color: #0d0400;
            color: #4a2211;
            border-color: #2a1106;
        }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px; /* Más separación vertical */
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .kb-row {
            display: flex;
            justify-content: center;
            gap: 6px; /* Más separación horizontal */
            width: 100%;
        }

        .key {
            background: rgba(26, 11, 0, 0.8);
            color: var(--text-main);
            border: 2px solid #5a2811;
            border-radius: 8px; /* Botones táctiles amigables */
            padding: 18px 0; /* Área táctil mucho más alta */
            flex: 1;
            font-family: var(--font-mono);
            font-size: 1.1rem; /* Letras del teclado más grandes */
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            user-select: none;
            box-sizing: border-box;
            transition: background 0.2s, border-color 0.2s;
            /* Previene el zoom en móviles al tocar rápido */
            touch-action: manipulation; 
        }

        .key:active {
            transform: scale(0.95);
        }

        .key.wide {
            flex: 1.6;
            font-size: 0.9rem;
        }

        .key.correct { background: var(--portal-blue); color: #000; border-color: var(--portal-blue); }
        .key.present { background: var(--agorlab-orange); color: #000; border-color: var(--agorlab-orange); }
        .key.absent { background: #0d0400; color: #311508; border-color: #1a0a05; }

        footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
            padding-bottom: 20px;
        }

        #tip {
            font-size: 0.9rem;
            color: var(--text-main);
            text-align: center;
            min-height: 1.2rem;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        button.action-btn {
            background: rgba(255, 85, 0, 0.1);
            color: var(--agorlab-orange);
            border: 2px solid var(--agorlab-orange);
            border-radius: 8px;
            padding: 12px 24px;
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        button.action-btn:active {
            background: var(--agorlab-orange);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <header>
            <h1>Agorlab_</h1>
            <span class="subtitle">> DECRYPTING_PROTOCOL</span>
        </header>

        <div id="wordle-grid"></div>

        <div class="keyboard" id="keyboard"></div>

        <footer>
            <span id="tip">> CARGANDO SISTEMA...</span>
            <button class="action-btn" onclick="initGame()" id="reset-btn" style="display:none;">[ REINICIAR ]</button>
        </footer>
    </div>

    <script>
        // Lista curada estrictamente a SUSTANTIVOS de 5 letras
        const WORDS = [
            "ABUSO", "ACERO", "ACTOR", "AGUAS", "AGUJA", "ALIEN", "ALMAS", "ALTAR", "AMIGA", "AMIGO", 
            "ANGEL", "APOYO", "ARBOL", "ARENA", "ARMAS", "AROMA", "ASTRO", "AUTOS", "AVION", "AYUDA", 
            "BAILE", "BALON", "BANCO", "BANDA", "BARBA", "BARCO", "BARRO", "BASES", "BESOS", "BICHO", 
            "BLUSA", "BOCAS", "BOLSA", "BOMBA", "BONOS", "BORDE", "BOTAS", "BOTES", "BRAZO", "BRISA", 
            "BROMA", "BRUJA", "BURLA", "CACAO", "CAIDA", "CAJAS", "CALDO", "CALLE", "CALOR", "CAMAS", 
            "CAMPO", "CANAL", "CANTO", "CARAS", "CARGA", "CARNE", "CARTA", "CASAS", "CASCO", "CAUSA", 
            "CELDA", "CELOS", "CENAS", "CERDO", "CESTA", "CHICA", "CHICO", "CHINA", "CHINO", "CIELO", 
            "CIFRA", "CINTA", "CISNE", "CLASE", "CLIMA", "COBRE", "COCHE", "COLOR", "COPIA", "CORAL", 
            "CORTE", "COSAS", "COSTO", "CRUCE", "CUEVA", "CULPA", "CULTO", "CURSO", "DADOS", "DANZA", 
            "DATOS", "DEDOS", "DIETA", "DIOSA", "DISCO", "DOLOR", "DOSIS", "DUDAS", "DUELO", "DUEÑO", 
            "ENERO", "EPOCA", "ERROR", "ESPIA", "ETAPA", "ETICA", "EXITO", "FALLA", "FALTA", "FAROL", 
            "FAVOR", "FECHA", "FERIA", "FIBRA", "FICHA", "FIERA", "FILAS", "FINAL", "FLORA", "FLOTA", 
            "FONDO", "FORMA", "FORRO", "FOTOS", "FRASE", "FRENO", "FRESA", "FRUTA", "FUEGO", "FUGAS", 
            "FUNDA", "FURIA", "FUSIL", "GAFAS", "GALLO", "GANAS", "GASTO", "GATOS", "GENIO", "GENTE", 
            "GOLPE", "GOMAS", "GORRA", "GORRO", "GOTAS", "GRADO", "GRASA", "GRITO", "GRUPO", "GUION", 
            "GUSTO", "HACHA", "HADAS", "HECHO", "HEROE", "HIELO", "HIJOS", "HILOS", "HIMNO", "HOGAR", 
            "HOJAS", "HORAS", "HORNO", "HOTEL", "HUESO", "HUEVO", "HUIDA", "HUMOR", "HUMOS", "IDEAL", 
            "IDEAS", "IDOLO", "INDIO", "ISLAS", "JABON", "JAULA", "JEFES", "JOVEN", "JOYAS", "JUEGO", 
            "JUGOS", "JULIO", "JUNIO", "JUNTA", "KILOS", "LABIO", "LABOR", "LAGOS", "LADOS", "LANZA", 
            "LAPIZ", "LECHE", "LETRA", "LEYES", "LIBRO", "LICOR", "LIDER", "LIMON", "LINEA", "LISTA", 
            "LLAMA", "LLAVE", "LOBOS", "LOCAL", "LOGRO", "LUCHA", "LUCES", "LUGAR", "LUNES", "MADRE", 
            "MAGIA", "MANDO", "MANGO", "MANOS", "MANTA", "MAPAS", "MARCA", "MAREA", "MARZO", "MASAS", 
            "MEDIO", "MELON", "MENTE", "METRO", "MIEDO", "MILES", "MINAS", "MITAD", "MITOS", "MODOS", 
            "MONOS", "MONTE", "MORAL", "MOSCA", "MOTOR", "MUJER", "MULTA", "MUNDO", "MUROS", "MUSEO", 
            "NARIZ", "NAVES", "NIÑOS", "NIVEL", "NOCHE", "NODOS", "NORMA", "NORTE", "NOTAS", "NUBES", 
            "OASIS", "OBRAS", "OCASO", "OESTE", "OIDOS", "ORDEN", "OREJA", "ORINA", "ORUGA", "OVEJA", 
            "OXIDO", "PADRE", "PAGOS", "PALAS", "PAPEL", "PARED", "PARES", "PARTE", "PASOS", "PASTA", 
            "PATAS", "PATIO", "PECHO", "PEDAL", "PELEA", "PELOS", "PENAS", "PERRO", "PESCA", "PESOS", 
            "PICOS", "PIEZA", "PILAS", "PINOS", "PINTA", "PIOJO", "PISOS", "PISTA", "PIZZA", "PLACA", 
            "PLAGA", "PLANO", "PLATA", "PLATO", "PLAYA", "PLAZA", "PLOMO", "PLUMA", "POEMA", "POETA", 
            "POLLO", "POLVO", "POSTE", "PRADO", "PRIMA", "PRIMO", "PRISA", "PROSA", "PULSO", "PUNTO", 
            "QUESO", "RADIO", "RAMAS", "RATON", "RAYOS", "RAZON", "REDES", "REGLA", "REINA", "REINO", 
            "RELOJ", "RENTA", "RESTO", "REYES", "RITMO", "RIVAL", "ROCAS", "ROPAS", "ROSAS", "RUIDO", 
            "RUINA", "RUMBO", "RUTAS", "SACOS", "SALAS", "SALDO", "SALON", "SALTO", "SALUD", "SANTO", 
            "SELLO", "SELVA", "SEÑAL", "SEÑOR", "SERES", "SIGLO", "SIGNO", "SILLA", "SITIO", "SOCIO", 
            "SODIO", "SUELO", "SUEÑO", "SUIZA", "SUSTO", "TABLA", "TACOS", "TACTO", "TALLA", "TALON", 
            "TARDE", "TAREA", "TAZAS", "TECHO", "TECLA", "TELAS", "TEMAS", "TEMOR", "TENIS", "TEXTO", 
            "TIGRE", "TIMON", "TINTA", "TIPOS", "TONOS", "TORRE", "TOTAL", "TRAJE", "TRAMA", "TRATO", 
            "TRIBU", "TRIGO", "TRIPA", "TROPA", "TRUCO", "TUBOS", "TUMBA", "TUNEL", "UNION", "VACAS", 
            "VALLE", "VALOR", "VAPOR", "VASOS", "VECES", "VELAS", "VENTA", "VENUS", "VERBO", "VERSO", 
            "VIAJE", "VICIO", "VIDAS", "VILLA", "VINOS", "VIRUS", "VISTA", "VOCES", "VOTOS", "VUELO", 
            "ZANJA", "ZONAS", "ZORRO"
        ];
        
        const KB_LAYOUT = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L', 'Ñ'],
            ['ENTER', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', 'DEL']
        ];

        let secret = "";
        let row = 0;
        let col = 0;
        let gridData = [];
        let isOver = false;

        function initGame() {
            secret = WORDS[Math.floor(Math.random() * WORDS.length)];
            row = 0;
            col = 0;
            isOver = false;
            gridData = Array(6).fill().map(() => Array(5).fill(''));
            
            document.getElementById('reset-btn').style.display = 'none';
            setTip("> INGRESE SECUENCIA DE 5 LETRAS.");
            
            drawGrid();
            drawKeyboard();
        }

        function drawGrid() {
            const container = document.getElementById('wordle-grid');
            container.innerHTML = '';

            for (let r = 0; r < 6; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';

                for (let c = 0; c < 5; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    const char = gridData[r][c];
                    tile.innerText = char;

                    if (r < row) {
                        if (char === secret[c]) {
                            tile.classList.add('correct');
                        } else if (secret.includes(char)) {
                            tile.classList.add('present');
                        } else {
                            tile.classList.add('absent');
                        }
                    }

                    rowDiv.appendChild(tile);
                }
                container.appendChild(rowDiv);
            }
        }

        function drawKeyboard() {
            const container = document.getElementById('keyboard');
            container.innerHTML = '';

            KB_LAYOUT.forEach(rowKeys => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'kb-row';

                rowKeys.forEach(key => {
                    const btn = document.createElement('button');
                    btn.className = 'key';
                    btn.innerText = key;

                    if (key === 'ENTER' || key === 'DEL') {
                        btn.classList.add('wide');
                    }

                    btn.onclick = () => pressKey(key);

                    // Evaluar color de tecla si ya fue usada
                    if (key.length === 1 && row > 0) {
                        let status = getKeyStatus(key);
                        if (status) btn.classList.add(status);
                    }

                    rowDiv.appendChild(btn);
                });

                container.appendChild(rowDiv);
            });
        }

        function getKeyStatus(letter) {
            let res = null;
            for (let r = 0; r < row; r++) {
                for (let c = 0; c < 5; c++) {
                    if (gridData[r][c] === letter) {
                        if (secret[c] === letter) return 'correct';
                        if (secret.includes(letter)) res = 'present';
                        else if (!res) res = 'absent';
                    }
                }
            }
            return res;
        }

        function pressKey(key) {
            if (isOver) return;

            if (key === 'DEL') {
                if (col > 0) {
                    col--;
                    gridData[row][col] = '';
                    drawGrid();
                }
            } else if (key === 'ENTER') {
                if (col < 5) {
                    setTip("> ERROR: Secuencia incompleta.");
                    return;
                }
                checkGuess();
            } else {
                if (col < 5) {
                    gridData[row][col] = key;
                    col++;
                    drawGrid();
                }
            }
        }

        function checkGuess() {
            const guess = gridData[row].join('');
            row++;
            col = 0;

            drawGrid();
            drawKeyboard();

            if (guess === secret) {
                setTip("> ACCESO CONCEDIDO.");
                isOver = true;
                document.getElementById('reset-btn').style.display = 'block';
                return;
            }

            if (row === 6) {
                setTip(`> BLOQUEADO. Solución: ${secret}`);
                isOver = true;
                document.getElementById('reset-btn').style.display = 'block';
                return;
            }

            setTip(`> Intento ${row}/6 cargado.`);
        }

        function setTip(txt) {
            document.getElementById('tip').innerText = txt;
        }

        // Event listener de soporte para teclado físico
        window.addEventListener('keydown', (e) => {
            const k = e.key.toUpperCase();
            if (k === 'BACKSPACE') pressKey('DEL');
            else if (k === 'ENTER') pressKey('ENTER');
            else if (/^[A-ZÑ]$/.test(k)) pressKey(k);
        });

        // Ejecución limpia al cargar el DOM
        window.onload = initGame;
    </script>
</body>
</html>
