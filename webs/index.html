<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agorlab - Multi-Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700;900&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow-x: hidden; font-family: 'Inter', sans-serif; transition: background 0.5s; }
        #app { min-height: 100vh; width: 100vw; position: relative; }

        /* Estilos para el botón "a" */
        #agorlab-toggle {
            position: fixed;
            top: 10px;
            left: 10px;
            background-color: #000000;
            color: #FF5F00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            border: 1px solid #FF5F00;
            padding: 4px 12px;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 0 8px rgba(255, 95, 0, 0.4);
            transition: all 0.2s ease;
        }
        #agorlab-toggle:hover {
            background-color: #FF5F00;
            color: #000000;
            box-shadow: 0 0 12px rgba(255, 95, 0, 0.8);
        }

        /* Estilos para el cartel explicativo descartable */
        #agorlab-tooltip {
            position: fixed;
            top: 55px;
            left: 10px;
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #FF5F00;
            border-radius: 10px;
            padding: 10px 28px 10px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: bold;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 220px;
            line-height: 1.3;
            animation: tooltip-fade 0.3s ease-in-out;
        }
        #agorlab-tooltip::before {
            content: '';
            position: absolute;
            top: -9px;
            left: 12px;
            border-width: 0 7px 9px 7px;
            border-style: solid;
            border-color: transparent transparent #FF5F00 transparent;
        }
        #agorlab-tooltip-close {
            position: absolute;
            top: 4px;
            right: 6px;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            line-height: 1;
            padding: 2px 4px;
        }
        #agorlab-tooltip-close:hover {
            color: #FF5F00;
        }

        @keyframes tooltip-fade {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilos para el panel desplegable */
        #agorlab-panel {
            position: fixed;
            top: 60px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.95);
            color: #FF5F00;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid #FF5F00;
            padding: 15px;
            z-index: 9998;
            box-shadow: 0 0 10px rgba(255, 95, 0, 0.3);
            min-width: 250px;
            display: none; 
            flex-direction: column;
            gap: 10px;
        }

        #agorlab-panel.visible { display: flex; }
        #agorlab-panel h3 { font-size: 1.1rem; letter-spacing: 1px; margin-bottom: 5px; margin-top: 0; }
        #agorlab-panel label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; font-family: 'Inter', sans-serif;}
        #agorlab-panel select { padding: 8px; background: #181818; color: #fff; border: 1px solid #444; cursor: pointer; border-radius: 4px; font-size: 0.85rem; outline: none; font-family: 'Inter', sans-serif; max-width: 100%;}
        #agorlab-panel select:focus { border-color: #FF5F00; }
    </style>
    <style id="dynamic-css"></style>
</head>
<body>

    <div id="app"></div>

    <button id="agorlab-toggle">a</button>

    <div id="agorlab-tooltip">
        <button id="agorlab-tooltip-close" title="Cerrar">&times;</button>
        ¡Este botón te permite explorar ejemplos visuales de nuestras ofertas! ¡Con un clic en el boton puedes abrir o cerrar el panel de selección de motores visuales! 
    </div>
    
    <div id="agorlab-panel" class="hidden">
        <h3>[ Agorlab Engine ]</h3>
        <label>Seleccionar Arquitectura:</label>
        <select id="engine-select"></select>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnToggle = document.getElementById('agorlab-toggle');
            const panelAgorlab = document.getElementById('agorlab-panel');
            const tooltip = document.getElementById('agorlab-tooltip');
            const btnCloseTooltip = document.getElementById('agorlab-tooltip-close');

            if (btnCloseTooltip) {
                btnCloseTooltip.addEventListener('click', () => {
                    tooltip.style.display = 'none';
                });
            }

            // TU CÓDIGO ORIGINAL DEL BOTÓN
            btnToggle.addEventListener('click', () => {
                panelAgorlab.classList.toggle('visible');
                if (tooltip) tooltip.style.display = 'none';

                if (panelAgorlab.classList.contains('visible')) {
                    btnToggle.style.backgroundColor = '#FF5F00';
                    btnToggle.style.color = '#000000';
                } else {
                    btnToggle.style.backgroundColor = '#000000';
                    btnToggle.style.color = '#FF5F00';
                }
            });

            // ----------------------------------------------------
            // NUEVO CÓDIGO OPTIMIZADO: Cerrar el panel al hacer clic afuera
            // ----------------------------------------------------
            document.addEventListener('click', (event) => {
                // Primero revisamos si el panel está abierto
                if (panelAgorlab.classList.contains('visible')) {
                    // Verificamos que el clic NO sea dentro del panel Y NO sea dentro o sobre el botón
                    if (!panelAgorlab.contains(event.target) && !btnToggle.contains(event.target)) {
                        // Ocultamos el panel
                        panelAgorlab.classList.remove('visible');
                        
                        // Restauramos los colores del botón a su estado original (cerrado)
                        btnToggle.style.backgroundColor = '#000000';
                        btnToggle.style.color = '#FF5F00';
                    }
                }
            });
            // ----------------------------------------------------

        });

        const CONTENT = {

                { id: "s2", title: "Contacto Directo", desc: "Formulario vinculado a tu correo.", price: "Incluido" },

                    window.dragWin = (e, id) => {
                        let activeWin = document.getElementById(id);
                        if (!activeWin) return;
                        activeWin.style.zIndex = 1000;
                        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        let offsetX = clientX - activeWin.getBoundingClientRect().left;
                        let offsetY = clientY - activeWin.getBoundingClientRect().top;
                        
                        const move = (ev) => {
                            ev.preventDefault(); // previene scroll en mobile
                            let mX = ev.touches ? ev.touches[0].clientX : ev.clientX;
                            let mY = ev.touches ? ev.touches[0].clientY : ev.clientY;
                            activeWin.style.left = (mX - offsetX) + 'px';
                            activeWin.style.top = (mY - offsetY) + 'px';
                        };
                        const up = () => { 
                            document.removeEventListener('mousemove', move);
                            document.removeEventListener('touchmove', move);
                            document.removeEventListener('mouseup', up);
                            document.removeEventListener('touchend', up);
                        };
                        document.addEventListener('mousemove', move);
                        document.addEventListener('touchmove', move, {passive: false});
                        document.addEventListener('mouseup', up);
                        document.addEventListener('touchend', up);
                    };
                }
            },

                    `;
                    window.drag = (e, el) => {
                        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        let offsetX = clientX - el.getBoundingClientRect().left;
                        let offsetY = clientY - el.getBoundingClientRect().top;
                        el.style.zIndex = 100;
                        
                        const move = (ev) => {
                            ev.preventDefault();
                            let mX = ev.touches ? ev.touches[0].clientX : ev.clientX;
                            let mY = ev.touches ? ev.touches[0].clientY : ev.clientY;
                            el.style.left = (mX - offsetX) + 'px';
                            el.style.top = (mY - offsetY) + 'px';
                        };
                        const up = () => {
                            document.removeEventListener('mousemove', move);
                            document.removeEventListener('touchmove', move);
                            document.removeEventListener('mouseup', up);
                            document.removeEventListener('touchend', up);
                            el.style.zIndex = 2;
                        };

                    };
